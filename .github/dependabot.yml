version: 2
updates:
  # npm dependencies across the pnpm workspace. Grouping minor + patch bumps into a single PR keeps
  # the noise down; major bumps still arrive as individual PRs so they get real review.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows/. Keeps the CI actions current (and is a prerequisite for the
  # SHA-pinning follow-up once the repo is public — see TASK-68).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
