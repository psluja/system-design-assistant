name: Feature request
description: Suggest a capability, a modeled component, or an improvement.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. A quick reminder of two invariants that shape what can be built:

        - The **engine is domain-agnostic** — it knows nothing about system design. New
          system/infrastructure meaning is added as **content** (data), not engine code.
        - The **tool must not lie** — modeled numbers must be sourced or marked `unknown`, never
          invented. A feature that would require guessing infra numbers is unlikely to land as-is.

        Keeping these in mind up front makes proposals much easier to accept.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the need, not just a solution. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. If it's a new component to model, name the real service/limits.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this touch?
      options:
        - Engine (solve / sim / core)
        - Content (modeled components, registry, protocols)
        - Web app (@sda/web)
        - VS Code extension (sda-vscode)
        - MCP server / AI bridge
        - Docs / project health
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources for any numbers
      description: >
        If the proposal involves capacity/latency/cost/limit numbers, cite where they come from
        (vendor docs, benchmarks). Unsourced numbers cannot be modeled — they would make the tool lie.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short. Optional.
    validations:
      required: false
